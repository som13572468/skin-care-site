<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<title>피부분석</title>
<link rel="stylesheet" href="style.css">

<script>
(function () {

    const loginState = sessionStorage.getItem("login");

    if (loginState !== "true") {
        alert("로그인 후 이용해주세요");
        location.href = "login.html";
    }

})();
</script>

</head>

<body>

<header>
    <div class="logo">AI SKIN</div>
    <nav>
        <a href="index.html">홈</a>
        <a href="community.html">게시판</a>
        <a href="login.html">로그인</a>
    </nav>
</header>

<div class="analysis-box">

    <h2>피부분석</h2>

    <div class="check-group">
        <label><input type="checkbox" value="여드름"> 여드름</label>
        <label><input type="checkbox" value="수분부족"> 수분부족</label>
        <label><input type="checkbox" value="모공"> 모공</label>
        <label><input type="checkbox" value="블랙헤드"> 블랙헤드</label>
        <label><input type="checkbox" value="홍조"> 홍조</label>
        <label><input type="checkbox" value="각질"> 각질</label>
    </div>

    <!-- 사진 업로드 -->
    <div class="upload-group">
        <label for="skinImage">피부 사진 첨부</label>
        <input
            type="file"
            id="skinImage"
            accept="image/*"
            onchange="previewImage(event)">
    </div>

    <!-- 미리보기 -->
    <img
        id="preview"
        style="display:none; width:250px; margin:15px 0; border-radius:10px;">

    <textarea
        id="skinInput"
        placeholder="피부 상태를 입력하세요"></textarea>

    <button class="analysis-btn" onclick="goResult()">AI 분석</button>

</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("preview");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
}
</script>

<script src="script.js"></script>

</body>
</html>
